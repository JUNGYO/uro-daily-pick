name: Manual Run

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'What to run'
        required: true
        type: choice
        options:
          - fetch-only
          - summarize-only
          - recommend-only
          - fetch-and-recommend
          - digest-only
          - all

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Fetch papers
        if: contains(fromJSON('["fetch-only","fetch-and-recommend","all"]'), github.event.inputs.task)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/fetch_papers.py

      - name: Classify papers
        if: contains(fromJSON('["recommend-only","fetch-and-recommend","all"]'), github.event.inputs.task)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/classify_papers.py

      - name: Summarize papers (Korean)
        if: contains(fromJSON('["summarize-only","recommend-only","fetch-and-recommend","all"]'), github.event.inputs.task)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/summarize_papers.py

      - name: Generate recommendations
        if: contains(fromJSON('["recommend-only","fetch-and-recommend","all"]'), github.event.inputs.task)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/generate_recs.py

      - name: Send email digests
        if: contains(fromJSON('["digest-only","all"]'), github.event.inputs.task)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scripts/send_digest.py

      - name: Send KakaoTalk digests
        if: contains(fromJSON('["digest-only","all"]'), github.event.inputs.task)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
        run: python scripts/send_kakao_digest.py
